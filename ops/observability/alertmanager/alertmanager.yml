global:
  resolve_timeout: 5m

route:
  receiver: local-webhook
  group_by:
    - alertname
    - service
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 30m

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://alert-webhook:8080/alerts
        send_resolved: true

