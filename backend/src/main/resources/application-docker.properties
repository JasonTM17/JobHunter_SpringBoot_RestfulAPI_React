# Docker runtime defaults: use compose service name instead of localhost.
spring.datasource.url=${DB_URL:jdbc:mysql://db:3306/jobhunter?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:jobhunter}
spring.datasource.password=${DB_PASSWORD:jobhunter}

# Flyway is enabled by default; schema is owned by migrations.
# Set FLYWAY_ENABLED=false only when using a pre-existing MySQL schema.
spring.flyway.enabled=${FLYWAY_ENABLED:true}

# JPA ddl-auto=none in Docker; Flyway runs the initial schema.
# Subsequent schema changes go through new Flyway migration scripts.
spring.jpa.hibernate.ddl-auto=${SON_JPA_DDL_AUTO:none}

# Keep demo seed enabled for docker/local runtime unless explicitly turned off.
jobhunter.seed.enabled=${JOBHUNTER_SEED_ENABLED:true}

# Storage path inside backend container.
son.upload-file.base-uri=${UPLOAD_BASE_URI:file:///app/storage/}
