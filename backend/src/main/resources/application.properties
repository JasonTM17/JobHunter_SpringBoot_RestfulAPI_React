spring.application.name=Jobhunter
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties],optional:file:backend/.env[.properties],optional:file:backend/.env.local[.properties]
server.port=${SERVER_PORT:8080}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3010,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3010,http://localhost:4173,http://localhost:5173,http://127.0.0.1:4173,http://127.0.0.1:5173}

apiPrefix=${API_PREFIX:/api/v1}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jobhunter?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SON_JPA_DDL_AUTO:none}
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway â€” migrations run BEFORE JPA schema init, so ddl-auto=none is safe.
# Dev profile overrides to ddl-auto=update for a smoother seed+dev loop.
# Test profile uses H2 with ddl-auto=create-drop (no Flyway needed).
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
jobhunter.seed.enabled=${JOBHUNTER_SEED_ENABLED:true}

# Admin bootstrap credentials â€” injected via env vars (see .env.example).
# Only used when jobhunter.seed.enabled=true.
# Disabling bootstrap.admin.enabled=true on a production DB prevents accidental overwrites.
jobhunter.bootstrap.admin.enabled=${JOBHUNTER_BOOTSTRAP_ADMIN_ENABLED:true}
jobhunter.bootstrap.admin.email=${JOBHUNTER_BOOTSTRAP_ADMIN_EMAIL:admin@jobhunter.local}
jobhunter.bootstrap.admin.password=${JOBHUNTER_BOOTSTRAP_ADMIN_PASSWORD:changeme}
jobhunter.bootstrap.admin.name=${JOBHUNTER_BOOTSTRAP_ADMIN_NAME:Super Admin}
jobhunter.bootstrap.admin.address=${JOBHUNTER_BOOTSTRAP_ADMIN_ADDRESS:HN}
jobhunter.bootstrap.admin.age=${JOBHUNTER_BOOTSTRAP_ADMIN_AGE:30}

son.jwt.base64-secret=${JWT_BASE64_SECRET}
son.jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_TTL:900}
son.jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_TOKEN_TTL:604800}
son.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
son.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Lax}
jobhunter.auth.password-reset.ttl-minutes=${PASSWORD_RESET_TTL_MINUTES:30}
jobhunter.auth.password-reset.dev-token-enabled=${PASSWORD_RESET_DEV_TOKEN_ENABLED:true}
jobhunter.prod-guard.enabled=${JOBHUNTER_PROD_GUARD_ENABLED:true}
jobhunter.security.unsafe-method-header.enabled=${JOBHUNTER_UNSAFE_METHOD_HEADER_ENABLED:true}
jobhunter.rate-limit.enabled=${JOBHUNTER_RATE_LIMIT_ENABLED:true}
jobhunter.rate-limit.login.max=${JOBHUNTER_RATE_LIMIT_LOGIN_MAX:10}
jobhunter.rate-limit.login.window-seconds=${JOBHUNTER_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
jobhunter.rate-limit.password-reset.max=${JOBHUNTER_RATE_LIMIT_PASSWORD_RESET_MAX:5}
jobhunter.rate-limit.password-reset.window-seconds=${JOBHUNTER_RATE_LIMIT_PASSWORD_RESET_WINDOW_SECONDS:900}
jobhunter.rate-limit.ai-chat.max=${JOBHUNTER_RATE_LIMIT_AI_CHAT_MAX:20}
jobhunter.rate-limit.ai-chat.window-seconds=${JOBHUNTER_RATE_LIMIT_AI_CHAT_WINDOW_SECONDS:60}

son.upload-file.base-uri=${UPLOAD_BASE_URI:file:///app/storage/}
son.upload-file.max-size-bytes=${UPLOAD_MAX_SIZE_BYTES:5242880}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:10MB}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
management.metrics.export.prometheus.enabled=true

logging.level.root=WARN
logging.level.com.vn.son.jobhunter=INFO
logging.level.org.springframework.web.servlet.resource=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate=ERROR

# Mail (Gmail SMTP)
jobhunter.mail.enabled=${MAIL_ENABLED:true}
jobhunter.mail.from=${MAIL_FROM:${spring.mail.username:}}
jobhunter.mail.template.app-name=${MAIL_TEMPLATE_APP_NAME:Jobhunter}
jobhunter.mail.template.portal-url=${MAIL_TEMPLATE_PORTAL_URL:http://localhost:3000}
jobhunter.mail.template.support-email=${MAIL_TEMPLATE_SUPPORT_EMAIL:support@jobhunter.local}
jobhunter.public-api-url=${JOBHUNTER_PUBLIC_API_URL:http://localhost:8080}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Source of truth for SMTP credentials remains spring.mail.*
# Compatibility fallback order:
# 1) MAIL_USERNAME / MAIL_PASSWORD
# 2) JOBHUNTER_MAIL_USERNAME / JOBHUNTER_MAIL_PASSWORD (legacy env naming)
# 3) GMAIL_USERNAME / GMAIL_APP_PASSWORD
spring.mail.username=${MAIL_USERNAME:${JOBHUNTER_MAIL_USERNAME:${GMAIL_USERNAME:}}}
spring.mail.password=${MAIL_PASSWORD:${JOBHUNTER_MAIL_PASSWORD:${GMAIL_APP_PASSWORD:}}}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}

openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.api.key=${OPENAI_API_KEY:}
openai.api.legacy-key=${OPEN_API_KEY:}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.api.key=${GEMINI_API_KEY:}
ai.provider=${AI_PROVIDER:auto}

# Scheduler
jobhunter.scheduler.enabled=${JOBHUNTER_SCHEDULER_ENABLED:false}
jobhunter.scheduler.mail.enabled=${JOBHUNTER_MAIL_CRON_ENABLED:false}
jobhunter.scheduler.mail.cron=${JOBHUNTER_MAIL_CRON:0 0 9 * * *}
jobhunter.scheduler.mail.zone=${JOBHUNTER_MAIL_CRON_ZONE:Asia/Ho_Chi_Minh}
jobhunter.scheduler.mail.recipient=${JOBHUNTER_MAIL_CRON_RECIPIENT:}
jobhunter.scheduler.mail.subject-prefix=${JOBHUNTER_MAIL_CRON_SUBJECT_PREFIX:[Jobhunter Scheduler]}
jobhunter.scheduler.mail.template=${JOBHUNTER_MAIL_CRON_TEMPLATE:mail/scheduler-heartbeat}
jobhunter.scheduler.weekly-recommendation.enabled=${JOBHUNTER_WEEKLY_RECOMMENDATION_ENABLED:false}
jobhunter.scheduler.weekly-recommendation.cron=${JOBHUNTER_WEEKLY_RECOMMENDATION_CRON:0 0 8 * * MON}
jobhunter.scheduler.weekly-recommendation.zone=${JOBHUNTER_WEEKLY_RECOMMENDATION_ZONE:Asia/Ho_Chi_Minh}
jobhunter.scheduler.weekly-recommendation.max-jobs-per-user=${JOBHUNTER_WEEKLY_RECOMMENDATION_MAX_JOBS:8}
jobhunter.scheduler.weekly-recommendation.recent-apply-days=${JOBHUNTER_WEEKLY_RECOMMENDATION_RECENT_APPLY_DAYS:180}
jobhunter.scheduler.weekly-recommendation.fallback-enabled=${JOBHUNTER_WEEKLY_RECOMMENDATION_FALLBACK_ENABLED:true}
jobhunter.scheduler.weekly-recommendation.manual-trigger-enabled=${JOBHUNTER_WEEKLY_RECOMMENDATION_MANUAL_TRIGGER_ENABLED:false}
jobhunter.scheduler.weekly-recommendation.manual-trigger-allowed-profiles=${JOBHUNTER_WEEKLY_RECOMMENDATION_MANUAL_TRIGGER_PROFILES:dev,local,docker,test}
jobhunter.scheduler.weekly-recommendation.candidate-page-size=${JOBHUNTER_WEEKLY_RECOMMENDATION_CANDIDATE_PAGE_SIZE:200}
jobhunter.scheduler.weekly-recommendation.max-candidates-per-run=${JOBHUNTER_WEEKLY_RECOMMENDATION_MAX_CANDIDATES:2000}
jobhunter.scheduler.log-cleanup.enabled=${JOBHUNTER_LOG_CLEANUP_ENABLED:false}
jobhunter.scheduler.log-cleanup.cron=${JOBHUNTER_LOG_CLEANUP_CRON:0 0 3 * * *}
jobhunter.scheduler.log-cleanup.zone=${JOBHUNTER_LOG_CLEANUP_ZONE:Asia/Ho_Chi_Minh}
jobhunter.scheduler.log-cleanup.retention-days=${JOBHUNTER_LOG_RETENTION_DAYS:7}
jobhunter.scheduler.log-cleanup.paths=${JOBHUNTER_LOG_CLEANUP_PATHS:logs}
jobhunter.scheduler.log-cleanup.include-patterns=${JOBHUNTER_LOG_CLEANUP_PATTERNS:*.log,*.log.*}
jobhunter.scheduler.log-cleanup.max-scan-files=${JOBHUNTER_LOG_CLEANUP_MAX_SCAN_FILES:10000}
jobhunter.scheduler.log-cleanup.manual-trigger-enabled=${JOBHUNTER_LOG_CLEANUP_MANUAL_TRIGGER_ENABLED:false}
jobhunter.scheduler.log-cleanup.manual-trigger-allowed-profiles=${JOBHUNTER_LOG_CLEANUP_MANUAL_TRIGGER_PROFILES:dev,local,docker,test}

# Swagger / OpenAPI
jobhunter.swagger.enabled=${JOBHUNTER_SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${jobhunter.swagger.enabled}
springdoc.swagger-ui.enabled=${jobhunter.swagger.enabled}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
