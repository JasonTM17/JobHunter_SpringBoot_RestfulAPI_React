spring.application.name=Jobhunter
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties],optional:file:backend/.env[.properties],optional:file:backend/.env.local[.properties]
cors.allowed-origins=

apiPrefix=${API_PREFIX:/api/v1}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/jobhunter?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SON_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}

son.jwt.base64-secret=${JWT_BASE64_SECRET}
son.jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_TTL:900}
son.jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_TOKEN_TTL:604800}
son.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
son.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Lax}

son.upload-file.base-uri=${UPLOAD_BASE_URI:file:///D:/PROJECT_INDIVIDUAL/Jobhunter/backend/storage/}
son.upload-file.max-size-bytes=${UPLOAD_MAX_SIZE_BYTES:5242880}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:10MB}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}

logging.level.root=WARN
logging.level.com.vn.son.jobhunter=INFO
logging.level.org.springframework.web.servlet.resource=ERROR
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate=ERROR

# Mail (Gmail SMTP)
jobhunter.mail.enabled=${MAIL_ENABLED:true}
jobhunter.mail.from=${MAIL_FROM:${spring.mail.username:xiaozhongli1710@gmail.com}}
jobhunter.mail.template.app-name=${MAIL_TEMPLATE_APP_NAME:Jobhunter}
jobhunter.mail.template.portal-url=${MAIL_TEMPLATE_PORTAL_URL:http://localhost:3000}
jobhunter.mail.template.support-email=${MAIL_TEMPLATE_SUPPORT_EMAIL:support@jobhunter.local}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
# Source of truth for SMTP credentials remains spring.mail.*
# Compatibility fallback order:
# 1) MAIL_USERNAME / MAIL_PASSWORD
# 2) JOBHUNTER_MAIL_USERNAME / JOBHUNTER_MAIL_PASSWORD (legacy env naming)
# 3) GMAIL_USERNAME / GMAIL_APP_PASSWORD
spring.mail.username=${MAIL_USERNAME:${JOBHUNTER_MAIL_USERNAME:${GMAIL_USERNAME:xiaozhongli1710@gmail.com}}}
spring.mail.password=${MAIL_PASSWORD:${JOBHUNTER_MAIL_PASSWORD:${GMAIL_APP_PASSWORD:}}}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}

openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.api.key=${OPENAI_API_KEY:}
openai.api.legacy-key=${OPEN_API_KEY:}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.api.key=${GEMINI_API_KEY:}
ai.provider=${AI_PROVIDER:auto}
