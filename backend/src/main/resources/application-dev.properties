logging.level.root=INFO
logging.level.com.vn.son.jobhunter=INFO
logging.level.com.vn.son.jobhunter.service.EmailService=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=ERROR

# Dev: use update so Hibernate can auto-sync columns after Flyway migrations.
# This makes the dev loop smoother — no manual migration needed for schema tweaks.
spring.jpa.hibernate.ddl-auto=${SON_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false

