<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body style="margin: 0; padding: 0; background: #f1f5f9;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; background: #f1f5f9;">
    <tr>
        <td align="center" style="padding: 28px 14px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                   style="border-collapse: collapse; max-width: 640px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 18px; overflow: hidden;">
                <tr th:replace="~{mail/fragments/brand :: header(${appName}, ${previewText})}">
                    <td></td>
                </tr>

                <tr>
                    <td style="padding: 28px 32px 18px;">
                        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #334155;">
                            Xin chào <strong th:text="${recipientName}">đội vận hành</strong>,
                        </p>
                        <h2 style="margin: 14px 0 0; font-family: Arial, sans-serif; font-size: 24px; line-height: 1.35; color: #0f172a;"
                            th:text="${title}">
                            Thông báo scheduler tự động
                        </h2>
                        <p style="margin: 14px 0 0; font-family: Arial, sans-serif; font-size: 15px; line-height: 1.75; color: #475569;"
                           th:text="${message}">
                            Hệ thống scheduler vẫn hoạt động ổn định.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 0 32px 24px;">
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
                               style="border-collapse: collapse; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;">
                            <tr>
                                <td style="padding: 12px 14px; font-family: Arial, sans-serif; font-size: 13px; color: #64748b; width: 35%; background: #f8fafc;">
                                    Môi trường
                                </td>
                                <td style="padding: 12px 14px; font-family: Arial, sans-serif; font-size: 13px; color: #0f172a;"
                                    th:text="${activeProfile}">default</td>
                            </tr>
                            <tr>
                                <td style="padding: 12px 14px; font-family: Arial, sans-serif; font-size: 13px; color: #64748b; width: 35%; background: #f8fafc;">
                                    Nguồn kích hoạt
                                </td>
                                <td style="padding: 12px 14px; font-family: Arial, sans-serif; font-size: 13px; color: #0f172a;"
                                    th:text="${triggerSource}">cron</td>
                            </tr>
                            <tr>
                                <td style="padding: 12px 14px; font-family: Arial, sans-serif; font-size: 13px; color: #64748b; width: 35%; background: #f8fafc;">
                                    Thời gian chạy
                                </td>
                                <td style="padding: 12px 14px; font-family: Arial, sans-serif; font-size: 13px; color: #0f172a;"
                                    th:text="${runAt}">2026-03-13 10:00:00 ICT</td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr th:replace="~{mail/fragments/brand :: footer(${currentYear}, ${supportEmail}, ${appName})}">
                    <td></td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
