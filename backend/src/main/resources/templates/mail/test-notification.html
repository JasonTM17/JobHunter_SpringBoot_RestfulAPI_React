<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body style="margin: 0; padding: 0; background: #eef2ff;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; background: #eef2ff;">
    <tr>
        <td align="center" style="padding: 28px 14px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse: collapse; max-width: 640px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 18px; overflow: hidden;">
                <tr th:replace="~{mail/fragments/brand :: header(${appName}, ${previewText})}">
                    <td></td>
                </tr>

                <tr>
                    <td style="padding: 28px 32px 20px;">
                        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #334155;">
                            Xin chào <strong th:text="${recipientName}">bạn</strong>,
                        </p>

                        <h2 style="margin: 14px 0 0; font-family: Arial, sans-serif; font-size: 24px; line-height: 1.35; color: #0f172a;" th:text="${title}">
                            Thông báo từ Jobhunter
                        </h2>

                        <p style="margin: 16px 0 0; font-family: Arial, sans-serif; font-size: 15px; line-height: 1.8; color: #475569; white-space: pre-line;" th:text="${message}">
                            Email này xác nhận hệ thống gửi mail của Jobhunter đang hoạt động bình thường.
                        </p>
                    </td>
                </tr>

                <tr th:if="${actionUrl != null and not #strings.isEmpty(actionUrl)}">
                    <td style="padding: 2px 32px 22px;">
                        <a
                                th:href="${actionUrl}"
                                style="display: inline-block; padding: 12px 20px; border-radius: 10px; background: #e11d48; color: #ffffff; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; text-decoration: none;"
                                th:text="${actionText}">
                            Mở Jobhunter
                        </a>
                    </td>
                </tr>

                <tr>
                    <td style="padding: 0 32px 28px;">
                        <p style="margin: 0; font-family: Arial, sans-serif; font-size: 13px; line-height: 1.7; color: #64748b;">
                            Nếu bạn không thực hiện thao tác này, bạn có thể bỏ qua email này.
                        </p>
                    </td>
                </tr>

                <tr th:replace="~{mail/fragments/brand :: footer(${currentYear}, ${supportEmail}, ${appName})}">
                    <td></td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
