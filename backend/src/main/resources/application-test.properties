logging.level.root=ERROR
logging.level.com.vn.son.jobhunter=WARN
logging.level.org.springframework.test=ERROR
spring.main.banner-mode=off
jobhunter.seed.enabled=false
jobhunter.scheduler.enabled=false
jobhunter.scheduler.mail.enabled=false
jobhunter.scheduler.weekly-recommendation.enabled=false

# Test: use H2 with create-drop; Flyway is disabled for fast test startup.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
