logging.level.root=WARN
logging.level.com.vn.son.jobhunter=INFO
logging.level.org.springframework=ERROR
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n

logging.file.name=${JOBHUNTER_LOG_FILE:logs/jobhunter.log}
logging.logback.rollingpolicy.file-name-pattern=${JOBHUNTER_LOG_ROLLING_PATTERN:logs/jobhunter.%d{yyyy-MM-dd}.%i.log.gz}
logging.logback.rollingpolicy.max-file-size=${JOBHUNTER_LOG_MAX_FILE_SIZE:20MB}
logging.logback.rollingpolicy.max-history=${JOBHUNTER_LOG_MAX_HISTORY:14}
logging.logback.rollingpolicy.total-size-cap=${JOBHUNTER_LOG_TOTAL_SIZE_CAP:1GB}
logging.logback.rollingpolicy.clean-history-on-start=${JOBHUNTER_LOG_CLEAN_HISTORY_ON_START:false}

# SECURITY: Swagger / OpenAPI — disabled in production.
jobhunter.swagger.enabled=${JOBHUNTER_SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${jobhunter.swagger.enabled}
springdoc.swagger-ui.enabled=${jobhunter.swagger.enabled}

# SECURITY: Actuator — expose only health+info; Prometheus/metrics are for
# internal monitoring (inside Docker network). Override via MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE in .env if needed.
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}

# SECURITY: Seed data and admin bootstrap — MUST be disabled in production.
jobhunter.seed.enabled=${JOBHUNTER_SEED_ENABLED:false}
jobhunter.bootstrap.admin.enabled=${JOBHUNTER_BOOTSTRAP_ADMIN_ENABLED:false}
