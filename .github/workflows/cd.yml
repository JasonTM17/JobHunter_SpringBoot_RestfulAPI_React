name: CD — Docker Hub Publish

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  BACKEND_IMAGE: jobhunter-backend
  FRONTEND_IMAGE: jobhunter-frontend

jobs:
  # ─────────────────────────────────────────────────────
  # Gate: avoid failing the whole workflow when Hub secrets are missing
  # (GitHub forbids using secrets in job-level `if`, so we probe in bash.)
  # ─────────────────────────────────────────────────────
  docker-hub-check:
    name: Check Docker Hub credentials
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/tags/v'))
    outputs:
      should_publish: ${{ steps.gate.outputs.should_publish }}
    steps:
      - name: Evaluate secrets
        id: gate
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_PASS: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_PASS" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Docker Hub publish skipped::Add secrets DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD (recommended: Docker Hub access token) under Settings - Secrets and variables - Actions to enable CD push."
          fi

  # ─────────────────────────────────────────────────────
  # Publish Docker images to Docker Hub
  # ─────────────────────────────────────────────────────
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-hub-check
    if: >-
      needs.docker-hub-check.outputs.should_publish == 'true' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
          flavor: |
            latest=true
          labels: |
            org.opencontainers.image.title=Jobhunter Backend API
            org.opencontainers.image.description=Jobhunter REST API backend — Spring Boot 3.x với JWT authentication, role-based access control, và đầy đủ CRUD cho jobs, companies, skills, resumes, users, permissions.
            org.opencontainers.image.source=https://github.com/JasonTM17/JobHunter_SpringBoot_RestfulAPI_React
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Jobhunter

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
          flavor: |
            latest=true
          labels: |
            org.opencontainers.image.title=Jobhunter Frontend Web
            org.opencontainers.image.description=Jobhunter frontend — Next.js 15 với TypeScript, TailwindCSS, role-based routing, job search, AI chatbot assistant, và responsive ITviec-style UI.
            org.opencontainers.image.source=https://github.com/JasonTM17/JobHunter_SpringBoot_RestfulAPI_React
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Jobhunter

      # ── Backend image ──────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ── Frontend image ──────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image digest (backend)
        run: |
          echo "Backend image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}"
          echo "Tags: ${{ steps.meta-backend.outputs.tags }}"

      - name: Image digest (frontend)
        run: |
          echo "Frontend image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}"
          echo "Tags: ${{ steps.meta-frontend.outputs.tags }}"

  # ─────────────────────────────────────────────────────
  # Build verification only (no push) on tag push
  # ─────────────────────────────────────────────────────
  verify-tag-build:
    name: Verify build on tag push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify backend build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: jobhunter-backend:verify
          cache-from: type=gha

      - name: Verify frontend build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: jobhunter-frontend:verify
          cache-from: type=gha

      - name: Docker images
        run: docker images | grep jobhunter

      - name: Summary
        run: |
          echo "## Release summary" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Backend image: ${{ secrets.DOCKERHUB_USERNAME }}/jobhunter-backend:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Frontend image: ${{ secrets.DOCKERHUB_USERNAME }}/jobhunter-frontend:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Docker Hub: https://hub.docker.com/u/${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_STEP_SUMMARY
