name: CD — Docker Hub Publish

on:
  push:
    branches: [master, main]
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  BACKEND_IMAGE: jobhunter-backend
  FRONTEND_IMAGE: jobhunter-frontend

jobs:
  # ─────────────────────────────────────────────────────
  # Publish Docker images to Docker Hub
  # ─────────────────────────────────────────────────────
  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))

    outputs:
      dockerhub_username: ${{ steps.vars.outputs.dockerhub_username }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      # ── Backend image ──────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ── Frontend image ──────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Image digest (backend)
        run: |
          echo "Backend image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}"
          echo "Tags: ${{ steps.meta-backend.outputs.tags }}"

      - name: Image digest (frontend)
        run: |
          echo "Frontend image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}"
          echo "Tags: ${{ steps.meta-frontend.outputs.tags }}"

  # ─────────────────────────────────────────────────────
  # Build verification only (no push) on tag push
  # ─────────────────────────────────────────────────────
  verify-tag-build:
    name: Verify build on tag push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify backend build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: jobhunter-backend:verify
          cache-from: type=gha

      - name: Verify frontend build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: jobhunter-frontend:verify
          cache-from: type=gha

      - name: Docker images
        run: docker images | grep jobhunter

      - name: Summary
        run: |
          echo "## Release summary" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Backend image: ${{ secrets.DOCKERHUB_USERNAME }}/jobhunter-backend:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Frontend image: ${{ secrets.DOCKERHUB_USERNAME }}/jobhunter-frontend:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Docker Hub: https://hub.docker.com/u/${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_STEP_SUMMARY
