name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────────────
  # Backend: compile + test
  # ─────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x ./gradlew

      - name: Build (no test)
        run: ./gradlew --no-daemon classes testClasses --info 2>&1 | tail -20
        shell: bash

      - name: Run backend tests
        run: ./gradlew --no-daemon test
        shell: bash

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/test/
          retention-days: 7

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/build/libs/
          retention-days: 1

  # ─────────────────────────────────────────────────────
  # Frontend: lint + test
  # ─────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
          NEXT_PUBLIC_STORAGE_BASE_URL: http://localhost:8080

  frontend-visual:
    name: Frontend visual regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual snapshot regression
        run: npm run test:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-failures
          path: frontend/test-results/
          retention-days: 7

  smoke-local:
    name: Local smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start Docker stack
        run: docker compose up -d --build db backend frontend

      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become healthy in time."
          exit 1
        shell: bash

      - name: Wait for frontend home
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:3001/ > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not become reachable in time."
          exit 1
        shell: bash

      - name: Run smoke script
        run: npm run smoke:local -- --frontend-url=http://localhost:3001 --api-base-url=http://localhost:8080/api/v1

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────────────
  # Docker build verification (no push)
  # ─────────────────────────────────────────────────────
  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: jobhunter-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: jobhunter-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────
  # All-green gate
  # ─────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, frontend-visual, smoke-local]
    if: always()
    steps:
      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
        shell: bash
      - name: All checks passed
        run: echo "All CI checks passed"
